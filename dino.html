<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Dino Game - Pixel Art Edition</title>
    <style>
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }
        
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a472a 0%, #2d5a3b 100%);
            font-family: 'Courier New', 'VT323', monospace;
            touch-action: manipulation;
            overflow: hidden;
            position: fixed;
            width: 100%;
            height: 100%;
        }
        
        .game-container {
            background: #2c2c2c;
            border-radius: 15px;
            padding: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.1);
            border: 2px solid #5a5a5a;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 10px;
        }
        
        .canvas-wrapper {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        canvas {
            border: 3px solid #1a1a1a;
            display: block;
            background: #87CEEB;
            cursor: pointer;
            touch-action: none;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            image-rendering: crisp-edges;
            image-rendering: pixelated;
            image-rendering: pixelated;
            width: 100%;
            height: auto;
        }
        
        .info {
            text-align: center;
            margin-top: 15px;
            width: 100%;
        }
        
        .score-panel {
            background: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: baseline;
            padding: 8px 20px;
            border-radius: 10px;
            margin-bottom: 12px;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.5), 0 2px 0 #4a4a4a;
            gap: 10px;
            flex-wrap: wrap;
        }
        
        .score-label {
            color: #ffd700;
            font-size: clamp(12px, 4vw, 18px);
            letter-spacing: 2px;
            text-shadow: 0 0 5px rgba(255,215,0,0.5);
        }
        
        .score-value {
            color: #ffd700;
            font-size: clamp(20px, 6vw, 32px);
            font-weight: bold;
            text-shadow: 0 0 5px rgba(255,215,0,0.5);
        }
        
        .controls {
            display: flex;
            justify-content: center;
            gap: clamp(10px, 3vw, 20px);
            margin-top: 10px;
            flex-wrap: wrap;
        }
        
        button {
            background: linear-gradient(180deg, #4a4a4a 0%, #2a2a2a 100%);
            color: #ffd700;
            border: none;
            padding: clamp(8px, 3vw, 12px) clamp(16px, 5vw, 28px);
            font-size: clamp(14px, 4vw, 18px);
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            transition: all 0.1s ease;
            box-shadow: 0 4px 0 #1a1a1a;
            text-shadow: 0 1px 0 #1a1a1a;
            touch-action: manipulation;
            min-width: clamp(80px, 20vw, 120px);
        }
        
        button:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #1a1a1a;
        }
        
        .message {
            color: #aaa;
            font-size: clamp(10px, 3vw, 12px);
            margin-top: 10px;
            letter-spacing: 1px;
            padding: 0 10px;
            text-align: center;
        }
        
        .blink-o {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: clamp(40px, 15vw, 120px);
            font-weight: bold;
            font-family: monospace;
            color: #ff0000;
            text-shadow: 0 0 20px rgba(255,0,0,0.8), 0 0 40px rgba(255,0,0,0.5);
            z-index: 1000;
            pointer-events: none;
            animation: blinkLetter 0.15s infinite;
        }
        
        @keyframes blinkLetter {
            0%, 100% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
            50% { opacity: 0; transform: translate(-50%, -50%) scale(1.2); }
        }
        
        .mobile-instruction {
            display: none;
            background: rgba(0,0,0,0.8);
            color: #ffd700;
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 12px;
            margin-top: 10px;
            text-align: center;
        }
        
        @media (max-width: 768px) {
            .game-container {
                padding: 10px;
                margin: 5px;
            }
            
            .mobile-instruction {
                display: block;
            }
        }
        
        @media (orientation: landscape) and (max-height: 500px) {
            .game-container {
                flex-direction: row;
                gap: 15px;
                padding: 10px;
            }
            
            .info {
                margin-top: 0;
                min-width: 200px;
            }
            
            .mobile-instruction {
                display: none;
            }
        }
        
        @keyframes screenGlitch {
            0% { transform: translate(0); }
            20% { transform: translate(-2px, 1px); }
            40% { transform: translate(2px, -1px); }
            60% { transform: translate(-1px, 2px); }
            80% { transform: translate(1px, -2px); }
            100% { transform: translate(0); }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="canvas-wrapper">
            <canvas id="gameCanvas" width="800" height="400"></canvas>
        </div>
        <div class="info">
            <div class="score-panel">
                <span class="score-label">🏆 PONTUAÇÃO 🏆</span>
                <span class="score-value" id="score">0</span>
            </div>
            <div class="controls">
                <button id="jumpBtn">🦖 PULAR</button>
                <button id="restartBtn">🔄 REINICIAR</button>
            </div>
            <div class="message">
                💡 TOQUE NA TELA ou CLIQUE para pular | DESVIE DOS OBSTÁCULOS
            </div>
            <div class="mobile-instruction">
                👆 TOQUE EM QUALQUER LUGAR PARA PULAR
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        // Tamanho fixo do canvas (sempre 800x400 internamente)
        const CANVAS_WIDTH = 800;
        const CANVAS_HEIGHT = 400;
        canvas.width = CANVAS_WIDTH;
        canvas.height = CANVAS_HEIGHT;
        
        // Configurações do jogo (usando tamanho fixo)
        const GRAVIDADE = 0.6;
        const FORCA_PULO = -9.5;
        const VELOCIDADE_INICIAL = 4;
        const DISTANCIA_MINIMA_OBSTACULOS = 350;
        const PONTOS_PARA_GLITCH = 50;
        
        // Objeto do jogador
        const jogador = {
            x: 80,
            y: 0,
            altura: 35,
            largura: 28,
            velocidadeY: 0,
            noChao: true,
            framePerna: 0,
            chaoY: CANVAS_HEIGHT - 50,
            
            pular() {
                if (this.noChao) {
                    this.velocidadeY = FORCA_PULO;
                    this.noChao = false;
                    if ('vibrate' in navigator) {
                        navigator.vibrate(30);
                    }
                }
            },
            
            atualizar() {
                this.y += this.velocidadeY;
                this.velocidadeY += GRAVIDADE;
                
                if (this.y >= this.chaoY - this.altura) {
                    this.y = this.chaoY - this.altura;
                    this.noChao = true;
                    this.velocidadeY = 0;
                    this.framePerna = (this.framePerna + 0.2) % 2;
                }
                
                if (this.y < 0) {
                    this.y = 0;
                    this.velocidadeY = 0;
                }
            },
            
            desenhar() {
                ctx.fillStyle = '#2d5a1e';
                ctx.fillRect(this.x, this.y, this.largura, this.altura);
                
                ctx.fillStyle = '#4a8c2a';
                ctx.fillRect(this.x + 5, this.y + 10, this.largura - 10, 20);
                
                ctx.fillStyle = '#ffffff';
                ctx.fillRect(this.x + this.largura - 10, this.y + 8, 6, 6);
                ctx.fillStyle = '#000000';
                ctx.fillRect(this.x + this.largura - 9, this.y + 9, 4, 4);
                ctx.fillStyle = '#ffffff';
                ctx.fillRect(this.x + this.largura - 8, this.y + 10, 2, 2);
                
                ctx.fillStyle = '#1a3a0a';
                for(let i = 0; i < 3; i++) {
                    ctx.fillRect(this.x - 5 + i*8, this.y + 5 + i*8, 5, 8);
                }
                
                if (this.noChao) {
                    ctx.fillStyle = '#2d5a1e';
                    ctx.fillRect(this.x + 5, this.y + this.altura - 2, 7, 12);
                    ctx.fillRect(this.x + 16, this.y + this.altura - 2, 7, 12);
                    ctx.fillStyle = '#1a3a0a';
                    ctx.fillRect(this.x + 5, this.y + this.altura + 8, 7, 4);
                    ctx.fillRect(this.x + 16, this.y + this.altura + 8, 7, 4);
                } else {
                    ctx.fillStyle = '#2d5a1e';
                    ctx.fillRect(this.x + 5, this.y + this.altura - 5, 7, 15);
                    ctx.fillRect(this.x + 16, this.y + this.altura - 5, 7, 15);
                }
                
                ctx.fillStyle = '#2d5a1e';
                ctx.fillRect(this.x - 8, this.y + this.altura - 10, 8, 6);
            }
        };
        
        // Classe do obstáculo
        class Obstaculo {
            constructor(tipo = 'normal') {
                this.x = CANVAS_WIDTH;
                this.largura = 22;
                this.altura = 32;
                this.y = CANVAS_HEIGHT - this.altura - 50;
                this.tipo = tipo;
                this.ativo = true;
            }
            
            atualizar() {
                this.x -= velocidade;
            }
            
            desenhar() {
                if (this.tipo === 'glitch') {
                    ctx.save();
                    
                    for(let i = 0; i < 5; i++) {
                        if(Math.random() > 0.7) {
                            ctx.fillStyle = `rgba(255, ${Math.random() * 255}, 255, 0.8)`;
                            ctx.fillRect(this.x + (Math.random() - 0.5) * 8, 
                                       this.y + (Math.random() - 0.5) * 8, 
                                       this.largura, this.altura);
                        }
                    }
                    
                    ctx.fillStyle = '#ff00ff';
                    ctx.fillRect(this.x, this.y, this.largura, this.altura);
                    
                    ctx.fillStyle = '#ff0000';
                    for(let i = 0; i < 4; i++) {
                        ctx.fillRect(this.x + 3 + i*4, this.y + 5, 2, 8);
                        ctx.fillRect(this.x + 3 + i*4, this.y + 20, 2, 8);
                    }
                    
                    ctx.fillStyle = '#00ff00';
                    ctx.fillRect(this.x + 8, this.y + 12, 6, 8);
                    
                    ctx.restore();
                } else {
                    ctx.fillStyle = '#2d6b1e';
                    ctx.fillRect(this.x + 8, this.y - 15, 6, 20);
                    
                    ctx.fillStyle = '#3a8a2a';
                    ctx.fillRect(this.x, this.y, this.largura, this.altura);
                    
                    ctx.fillStyle = '#2a6a1a';
                    ctx.fillRect(this.x + 4, this.y - 12, 5, 15);
                    ctx.fillRect(this.x + 13, this.y - 8, 5, 12);
                    
                    ctx.fillStyle = '#ffff00';
                    for(let i = 0; i < 3; i++) {
                        ctx.fillRect(this.x + 2, this.y + 5 + i*10, 2, 2);
                        ctx.fillRect(this.x + 18, this.y + 5 + i*10, 2, 2);
                    }
                    
                    ctx.fillStyle = '#1a4a0a';
                    ctx.fillRect(this.x + 2, this.y + 5, 3, 22);
                }
            }
            
            colidiu(jogador) {
                return (jogador.x < this.x + this.largura &&
                       jogador.x + jogador.largura > this.x &&
                       jogador.y < this.y + this.altura &&
                       jogador.y + jogador.altura > this.y);
            }
        }
        
        // Variáveis globais
        let obstaculos = [];
        let pontuacao = 0;
        let velocidade = VELOCIDADE_INICIAL;
        let jogoAtivo = true;
        let glitchAtivo = false;
        let glitchObstaculoGerado = false;
        let animacaoId = null;
        let frameCount = 0;
        
        // Função para piscar a letra O
        function piscarLetraO() {
            return new Promise((resolve) => {
                let contador = 0;
                const blinkElement = document.createElement('div');
                blinkElement.className = 'blink-o';
                blinkElement.textContent = 'O';
                document.body.appendChild(blinkElement);
                
                canvas.style.animation = 'screenGlitch 0.05s infinite';
                
                const interval = setInterval(() => {
                    contador++;
                    if (contador >= 10) {
                        clearInterval(interval);
                        blinkElement.remove();
                        canvas.style.animation = '';
                        resolve();
                    }
                }, 150);
            });
        }
        
        // Gerar obstáculos
        function gerarObstaculo() {
            let podeGerar = true;
            if (obstaculos.length > 0) {
                const ultimoObstaculo = obstaculos[obstaculos.length - 1];
                if (ultimoObstaculo.x > CANVAS_WIDTH - DISTANCIA_MINIMA_OBSTACULOS) {
                    podeGerar = false;
                }
            }
            
            const chanceGerar = 0.015;
            
            if (podeGerar && Math.random() < chanceGerar && obstaculos.length < 2) {
                let tipo = 'normal';
                
                if (pontuacao >= PONTOS_PARA_GLITCH && !glitchObstaculoGerado && !glitchAtivo) {
                    tipo = 'glitch';
                    glitchObstaculoGerado = true;
                    glitchAtivo = true;
                    
                    canvas.style.animation = 'screenGlitch 0.2s';
                    setTimeout(() => {
                        canvas.style.animation = '';
                    }, 200);
                }
                
                obstaculos.push(new Obstaculo(tipo));
            }
        }
        
        // Atualizar obstáculos
        function atualizarObstaculos() {
            for(let i = 0; i < obstaculos.length; i++) {
                obstaculos[i].atualizar();
                
                if(obstaculos[i].x + obstaculos[i].largura < 0) {
                    obstaculos.splice(i, 1);
                    i--;
                    
                    if(!jogoAtivo) continue;
                    
                    pontuacao += 5;
                    document.getElementById('score').textContent = Math.floor(pontuacao);
                    
                    if(pontuacao % 50 === 0 && velocidade < 9) {
                        velocidade += 0.3;
                    }
                    
                    if(glitchAtivo && obstaculos.length === 0) {
                        glitchAtivo = false;
                        glitchObstaculoGerado = false;
                    }
                }
            }
            
            gerarObstaculo();
        }
        
        // Verificar colisões
        function verificarColisoes() {
            for(let i = 0; i < obstaculos.length; i++) {
                if(obstaculos[i].colidiu(jogador)) {
                    if(obstaculos[i].tipo === 'glitch') {
                        gameOver('glitch');
                    } else {
                        gameOver('normal');
                    }
                    return true;
                }
            }
            return false;
        }
        
        // Desenhar elementos
        function desenharChao() {
            ctx.fillStyle = '#8B6946';
            ctx.fillRect(0, CANVAS_HEIGHT - 50, CANVAS_WIDTH, 8);
            
            ctx.fillStyle = '#4a8c2a';
            for(let i = 0; i < CANVAS_WIDTH; i += 12) {
                ctx.fillRect(i, CANVAS_HEIGHT - 55, 3, 8);
                ctx.fillRect(i + 4, CANVAS_HEIGHT - 53, 2, 6);
            }
            
            ctx.fillStyle = '#6a4a2a';
            for(let i = 0; i < CANVAS_WIDTH; i += 20) {
                ctx.fillRect(i, CANVAS_HEIGHT - 48, 2, 3);
            }
        }
        
        function desenharNuvens() {
            const tempo = (Date.now() / 100) % (CANVAS_WIDTH * 2);
            
            ctx.fillStyle = '#f0f0f0';
            ctx.fillRect((tempo * 0.3) % (CANVAS_WIDTH + 200) - 100, 60, 30, 20);
            ctx.fillRect((tempo * 0.3) % (CANVAS_WIDTH + 200) - 100 + 20, 50, 25, 25);
            ctx.fillRect((tempo * 0.3) % (CANVAS_WIDTH + 200) - 100 + 45, 55, 25, 20);
            
            ctx.fillStyle = '#e0e0e0';
            ctx.fillRect((tempo * 0.2 + 200) % (CANVAS_WIDTH + 300) - 150, 100, 35, 22);
            ctx.fillRect((tempo * 0.2 + 200) % (CANVAS_WIDTH + 300) - 150 + 25, 90, 28, 28);
            ctx.fillRect((tempo * 0.2 + 200) % (CANVAS_WIDTH + 300) - 150 + 55, 95, 30, 22);
        }
        
        function desenharSol() {
            ctx.fillStyle = '#ffdd00';
            ctx.fillRect(CANVAS_WIDTH - 70, 30, 30, 30);
            
            ctx.fillStyle = '#ffaa00';
            for(let i = 0; i < 8; i++) {
                const angle = (Date.now() / 500 + i) * Math.PI * 2 / 8;
                const x = CANVAS_WIDTH - 55 + Math.cos(angle) * 25;
                const y = 45 + Math.sin(angle) * 25;
                ctx.fillRect(x, y, 4, 4);
            }
        }
        
        function aplicarEfeitoGlitch() {
            if(glitchAtivo && jogoAtivo && Math.random() > 0.85) {
                const imageData = ctx.getImageData(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);
                const data = imageData.data;
                
                for(let i = 0; i < data.length; i += 4) {
                    if(Math.random() > 0.98) {
                        data[i] = 255;
                        data[i+1] = 0;
                        data[i+2] = 255;
                    }
                    if(Math.random() > 0.995) {
                        data[i] = Math.random() * 255;
                        data[i+1] = Math.random() * 255;
                        data[i+2] = Math.random() * 255;
                    }
                }
                
                ctx.putImageData(imageData, 0, 0);
            }
        }
        
        // Game over
        async function gameOver(tipo) {
            if(!jogoAtivo) return;
            
            jogoAtivo = false;
            
            if(tipo === 'glitch') {
                await piscarLetraO();
            }
            
            ctx.fillStyle = 'rgba(0, 0, 0, 0.85)';
            ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);
            
            ctx.fillStyle = '#ff4444';
            ctx.font = 'bold 32px "Courier New", monospace';
            ctx.textAlign = 'center';
            ctx.fillText('GAME OVER', CANVAS_WIDTH/2, CANVAS_HEIGHT/2 - 60);
            
            ctx.fillStyle = '#ffd700';
            ctx.font = '20px "Courier New", monospace';
            ctx.fillText(`PONTUAÇÃO: ${Math.floor(pontuacao)}`, CANVAS_WIDTH/2, CANVAS_HEIGHT/2 - 10);
            
            if(tipo === 'glitch') {
                ctx.fillStyle = '#ff00ff';
                ctx.font = 'bold 16px "Courier New", monospace';
                ctx.fillText('⚠️ VOCÊ ENCONTROU O GLITCH... ⚠️', CANVAS_WIDTH/2, CANVAS_HEIGHT/2 + 40);
                ctx.fillStyle = '#ff0000';
                ctx.font = '14px monospace';
                ctx.fillText('A LETRA "O" APARECEU...', CANVAS_WIDTH/2, CANVAS_HEIGHT/2 + 80);
            } else {
                ctx.fillStyle = '#cccccc';
                ctx.font = '16px monospace';
                ctx.fillText('TOQUE EM "REINICIAR"', CANVAS_WIDTH/2, CANVAS_HEIGHT/2 + 50);
            }
            
            ctx.textAlign = 'left';
        }
        
        // Reiniciar jogo
        function reiniciar() {
            if(animacaoId) {
                cancelAnimationFrame(animacaoId);
            }
            
            obstaculos = [];
            pontuacao = 0;
            velocidade = VELOCIDADE_INICIAL;
            jogoAtivo = true;
            glitchAtivo = false;
            glitchObstaculoGerado = false;
            frameCount = 0;
            
            jogador.y = 0;
            jogador.velocidadeY = 0;
            jogador.noChao = true;
            jogador.y = jogador.chaoY - jogador.altura;
            
            document.getElementById('score').textContent = '0';
            canvas.style.animation = '';
            
            loop();
        }
        
        // Loop principal
        function loop() {
            if(!jogoAtivo) {
                animacaoId = requestAnimationFrame(loop);
                return;
            }
            
            ctx.clearRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);
            
            const gradiente = ctx.createLinearGradient(0, 0, 0, CANVAS_HEIGHT);
            gradiente.addColorStop(0, '#87CEEB');
            gradiente.addColorStop(1, '#E0F0FF');
            ctx.fillStyle = gradiente;
            ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);
            
            desenharSol();
            desenharNuvens();
            desenharChao();
            
            jogador.atualizar();
            jogador.desenhar();
            
            atualizarObstaculos();
            
            for(let obstaculo of obstaculos) {
                obstaculo.desenhar();
            }
            
            verificarColisoes();
            aplicarEfeitoGlitch();
            
            frameCount++;
            animacaoId = requestAnimationFrame(loop);
        }
        
        // Eventos de pulo
        function pular(event) {
            if(event) {
                event.preventDefault();
            }
            if(jogoAtivo && jogador.noChao) {
                jogador.pular();
            }
            return false;
        }
        
        // Configurar eventos
        function setupEventos() {
            canvas.addEventListener('click', pular);
            canvas.addEventListener('touchstart', pular, { passive: false });
            
            const jumpBtn = document.getElementById('jumpBtn');
            jumpBtn.addEventListener('click', pular);
            jumpBtn.addEventListener('touchstart', pular, { passive: false });
            
            const restartBtn = document.getElementById('restartBtn');
            restartBtn.addEventListener('click', () => reiniciar());
            restartBtn.addEventListener('touchstart', (e) => {
                e.preventDefault();
                reiniciar();
            });
            
            document.addEventListener('keydown', (e) => {
                if(e.code === 'Space' || e.code === 'ArrowUp') {
                    e.preventDefault();
                    pular();
                }
                if(e.code === 'KeyR') {
                    e.preventDefault();
                    reiniciar();
                }
            });
            
            canvas.addEventListener('touchmove', (e) => {
                e.preventDefault();
            }, { passive: false });
        }
        
        // Ajustar CSS do canvas (apenas visual, sem afetar lógica)
        function ajustarCanvasVisual() {
            const container = document.querySelector('.canvas-wrapper');
            const maxWidth = Math.min(window.innerWidth - 40, 800);
            const scale = maxWidth / 800;
            canvas.style.width = `${800 * scale}px`;
            canvas.style.height = `${400 * scale}px`;
        }
        
        // Inicializar
        function init() {
            jogador.y = jogador.chaoY - jogador.altura;
            setupEventos();
            ajustarCanvasVisual();
            window.addEventListener('resize', ajustarCanvasVisual);
            window.addEventListener('orientationchange', () => {
                setTimeout(ajustarCanvasVisual, 100);
            });
            loop();
        }
        
        init();
    </script>
</body>
</html>
