<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jogo da Forca • O Mistério</title>
  <style>
    * {
      box-sizing: border-box;
      font-family: 'Segoe UI', 'Courier New', monospace, system-ui;
    }

    body {
      min-height: 100vh;
      margin: 0;
      background: linear-gradient(145deg, #0d1a0d 0%, #051005 100%);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .game-container {
      background: rgba(8, 18, 8, 0.95);
      backdrop-filter: blur(8px);
      border: 1px solid #2a4a2a;
      border-radius: 2rem;
      padding: 2rem 2rem 2.5rem;
      box-shadow: 0 25px 40px -10px rgba(0, 0, 0, 0.9), inset 0 0 0 1px #3a6a3a33;
      width: 600px;
      max-width: 96vw;
    }

    h1 {
      text-align: center;
      font-weight: 400;
      letter-spacing: 8px;
      text-transform: uppercase;
      font-size: 2.4rem;
      margin: 0 0 0.5rem 0;
      color: #a8c99a;
      text-shadow: 0 2px 5px #0a1f0a;
      word-break: keep-all;
      border-bottom: 1px dashed #2a5a2a;
      padding-bottom: 0.5rem;
    }

    .question-hint {
      text-align: center;
      font-size: 1.4rem;
      color: #b8d8a8;
      margin: 0.5rem 0 1.5rem 0;
      font-style: italic;
      letter-spacing: 1px;
      text-shadow: 0 0 8px #1a3a1a;
    }

    .forca-display {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    canvas {
      background: #0a1a0a;
      border-radius: 24px;
      border: 2px solid #2a5a2a;
      box-shadow: inset 0 0 20px #000000aa, 0 8px 0 #050f05;
      width: 100%;
      max-width: 280px;
      height: auto;
      aspect-ratio: 1/1;
      display: block;
      margin: 0 auto;
    }

    /* Área do mistério absoluto */
    .misterio-absoluto {
      margin: 35px 0 25px;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 60px;
    }

    .simbolos-misteriosos {
      font-size: 3rem;
      color: #5a8a4a;
      letter-spacing: 15px;
      text-shadow: 0 0 20px #2a5a2a;
      opacity: 0.7;
      font-weight: 300;
    }

    .teclado-virtual {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 8px;
      margin: 15px 0;
    }

    .tecla {
      background: #152a15;
      border: none;
      border-bottom: 3px solid #0a1a0a;
      color: #c8e0b8;
      font-size: 1.4rem;
      font-weight: bold;
      width: 52px;
      height: 52px;
      border-radius: 16px;
      text-transform: uppercase;
      box-shadow: 0 4px 0 #081408, inset 0 1px 3px #5a9a4a55;
      cursor: pointer;
      transition: 0.08s;
      display: flex;
      align-items: center;
      justify-content: center;
      user-select: none;
    }

    .tecla:hover:not(:disabled) {
      background: #1e3a1e;
      transform: translateY(-2px);
      box-shadow: 0 6px 0 #081408, inset 0 1px 4px #8ac87a;
    }

    .tecla:active:not(:disabled) {
      transform: translateY(2px);
      box-shadow: 0 2px 0 #081408;
    }

    .tecla:disabled {
      opacity: 0.35;
      background: #122012;
      border-bottom-color: #1a2a1a;
      box-shadow: none;
      cursor: not-allowed;
      transform: none;
      color: #5a7a4a;
    }

    .status-area {
      min-height: 60px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      margin: 20px 0 5px;
    }

    .tentativas-restantes {
      font-size: 1.3rem;
      color: #c0d8b0;
      background: #122a1270;
      padding: 8px 24px;
      border-radius: 40px;
      display: inline-block;
      border: 1px solid #3a7a3a;
      backdrop-filter: blur(4px);
    }

    .mensagem-especial {
      text-align: center;
      font-size: 1.1rem;
      line-height: 1.7;
      color: #d0e8c0;
      background: #0e1e0eb3;
      padding: 20px 24px;
      border-radius: 36px;
      margin: 20px 0 0;
      border-left: 6px solid #7ab86a;
      font-weight: 400;
      white-space: pre-line;
      backdrop-filter: blur(5px);
      box-shadow: inset 0 0 15px #0a1f0a;
    }

    .btn-reiniciar {
      background: #1e3518;
      border: none;
      color: #d8f0c8;
      font-size: 1.1rem;
      padding: 12px 28px;
      border-radius: 48px;
      font-weight: 600;
      letter-spacing: 3px;
      margin-top: 24px;
      cursor: pointer;
      box-shadow: 0 6px 0 #0a1508, 0 2px 12px #00000088;
      border: 1px solid #4a8a3a;
      transition: 0.1s;
      width: fit-content;
      align-self: center;
    }

    .btn-reiniciar:hover {
      background: #2a5520;
      transform: translateY(-3px);
      box-shadow: 0 9px 0 #0a1508, 0 4px 14px #000000aa;
    }

    .btn-reiniciar:active {
      transform: translateY(3px);
      box-shadow: 0 3px 0 #0a1508, 0 2px 8px #000000aa;
    }

    .game-over-mensagem {
      font-size: 1.5rem;
      color: #d8b87a;
      font-weight: bold;
    }

    .footer-actions {
      display: flex;
      justify-content: center;
    }

    .dica-misterio {
      color: #4a7a3a;
      font-size: 0.9rem;
      margin-top: 8px;
      text-align: center;
      font-style: italic;
    }

    .contador-letras {
      color: #6a9a5a;
      font-size: 1rem;
      margin-top: 5px;
    }
  </style>
</head>
<body>
<div class="game-container">
  <h1>FORCA</h1>
  <div class="question-hint">❓ Qual é o meu nome?</div>

  <!-- canvas da forca -->
  <div class="forca-display">
    <canvas id="canvasForca" width="300" height="300"></canvas>
  </div>

  <!-- Mistério absoluto - sempre mostra os mesmos símbolos -->
  <div class="misterio-absoluto">
    <div class="simbolos-misteriosos" id="simbolosMisteriosos">◈ ◈ ◈ ◈ ◈</div>
  </div>
  <div class="contador-letras" id="contadorLetras"></div>

  <!-- teclado virtual -->
  <div id="teclado" class="teclado-virtual"></div>

  <!-- status / tentativas -->
  <div class="status-area">
    <div id="tentativasMsg" class="tentativas-restantes"></div>
    <div id="mensagemVitoriaDerrota"></div>
  </div>

  <!-- botão reiniciar -->
  <div class="footer-actions">
    <button class="btn-reiniciar" id="reiniciarBtn">↻ TENTAR NOVAMENTE</button>
  </div>
  <div class="dica-misterio">o segredo permanece oculto...</div>
</div>

<script>
  (function(){
    "use strict";

    // ---------- PALAVRA TOTALMENTE OCULTA ----------
    const _bytes = [65, 83, 75, 79, 84];  // A,S,K,O,T
    const PALAVRA_SECRETA = _bytes.map(c => String.fromCharCode(c)).join('');
    
    const MAX_TENTATIVAS = 6;
    const TECLAS = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');
    
    // Símbolo fixo para mistério (sempre 5 símbolos, independente da palavra)
    const SIMBOLO_MISTERIO = '◈';
    const QUANTIDADE_SIMBOLOS = 5;  // fixo, não revela o tamanho real

    // Estado do jogo
    let palavraArray = [];
    let letrasDescobertas = [];
    let letrasTentadas = new Set();
    let erros = 0;
    let jogoAtivo = true;
    let vitoria = false;

    // Elementos DOM
    const canvas = document.getElementById('canvasForca');
    const ctx = canvas.getContext('2d');
    const simbolosMisteriosos = document.getElementById('simbolosMisteriosos');
    const contadorLetras = document.getElementById('contadorLetras');
    const tecladoDiv = document.getElementById('teclado');
    const tentativasMsg = document.getElementById('tentativasMsg');
    const mensagemVitoriaDerrota = document.getElementById('mensagemVitoriaDerrota');
    const reiniciarBtn = document.getElementById('reiniciarBtn');

    // ---------- Desenho da forca ----------
    function desenharForca(errosCount) {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      
      ctx.lineWidth = 5;
      ctx.strokeStyle = '#a8d898';
      ctx.fillStyle = '#d0e8c0';
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';
      ctx.shadowColor = '#1a3a1a';
      ctx.shadowBlur = 8;
      
      // Estrutura
      ctx.beginPath();
      ctx.moveTo(40, 260);
      ctx.lineTo(40, 30);
      ctx.lineTo(160, 30);
      ctx.lineTo(160, 60);
      ctx.stroke();
      
      ctx.beginPath();
      ctx.moveTo(20, 260);
      ctx.lineTo(80, 260);
      ctx.stroke();
      
      ctx.beginPath();
      ctx.moveTo(40, 200);
      ctx.lineTo(80, 260);
      ctx.stroke();
      
      ctx.beginPath();
      ctx.moveTo(160, 60);
      ctx.lineTo(160, 90);
      ctx.stroke();

      ctx.shadowBlur = 4;
      
      if (errosCount >= 1) {
        ctx.beginPath();
        ctx.arc(160, 110, 20, 0, Math.PI * 2);
        ctx.stroke();
      }
      if (errosCount >= 2) {
        ctx.beginPath();
        ctx.moveTo(160, 130);
        ctx.lineTo(160, 200);
        ctx.stroke();
      }
      if (errosCount >= 3) {
        ctx.beginPath();
        ctx.moveTo(160, 150);
        ctx.lineTo(130, 175);
        ctx.stroke();
      }
      if (errosCount >= 4) {
        ctx.beginPath();
        ctx.moveTo(160, 150);
        ctx.lineTo(190, 175);
        ctx.stroke();
      }
      if (errosCount >= 5) {
        ctx.beginPath();
        ctx.moveTo(160, 200);
        ctx.lineTo(135, 240);
        ctx.stroke();
      }
      if (errosCount >= 6) {
        ctx.beginPath();
        ctx.moveTo(160, 200);
        ctx.lineTo(185, 240);
        ctx.stroke();
        ctx.beginPath();
        ctx.lineWidth = 2.5;
        ctx.strokeStyle = '#a89060';
        ctx.moveTo(150, 102);
        ctx.lineTo(158, 110);
        ctx.moveTo(170, 102);
        ctx.lineTo(162, 110);
        ctx.stroke();
        ctx.lineWidth = 5;
        ctx.strokeStyle = '#a8d898';
      }
      
      ctx.shadowBlur = 0;
      ctx.shadowColor = 'transparent';
    }

    // ---------- Atualiza display (SEMPRE mostra símbolos, exceto na vitória) ----------
    function atualizarDisplay() {
      if (!jogoAtivo && vitoria) {
        // REVELA A PALAVRA APENAS NA VITÓRIA
        simbolosMisteriosos.textContent = PALAVRA_SECRETA.split('').join(' ');
        simbolosMisteriosos.style.color = '#d8f0c8';
        simbolosMisteriosos.style.textShadow = '0 0 25px #7ab86a';
        contadorLetras.textContent = '';
      } else {
        // Sempre mostra símbolos fixos, sem revelar nada
        const simbolos = Array(QUANTIDADE_SIMBOLOS).fill(SIMBOLO_MISTERIO).join(' ');
        simbolosMisteriosos.textContent = simbolos;
        simbolosMisteriosos.style.color = '#5a8a4a';
        simbolosMisteriosos.style.textShadow = '0 0 20px #2a5a2a';
        
        // Mostra quantas letras já foram tentadas (opcional, mas não revela quais acertou)
        if (jogoAtivo) {
          contadorLetras.textContent = `Letras tentadas: ${letrasTentadas.size}`;
        } else {
          contadorLetras.textContent = '';
        }
      }
    }

    // ---------- Verifica vitória ----------
    function verificarVitoria() {
      if (letrasDescobertas.every(v => v === true)) {
        vitoria = true;
        jogoAtivo = false;
        return true;
      }
      return false;
    }

    // ---------- Atualiza mensagens de status ----------
    function atualizarStatusMensagens() {
      if (!jogoAtivo) {
        if (vitoria) {
          mensagemVitoriaDerrota.innerHTML = `
            <div class="mensagem-especial">
              ✦ PARABÉNS!!! ✦<br>
              Você chegou até aqui… e descobriu o meu nome. Impressionante.<br><br>
              Estou orgulhoso de você. De verdade.<br>
              Mas não se engane — o show ainda não acabou.<br><br>
              Obrigado por se dedicar e ir tão longe.<br><br>
              — Askot
            </div>
          `;
          tentativasMsg.textContent = `🎉 Mistério revelado!`;
        } else {
          mensagemVitoriaDerrota.innerHTML = `<div class="game-over-mensagem">💀 O mistério permanece... Você não descobriu.</div>`;
          tentativasMsg.textContent = `😵 Fim de jogo.`;
        }
      } else {
        mensagemVitoriaDerrota.innerHTML = '';
        const restantes = MAX_TENTATIVAS - erros;
        tentativasMsg.textContent = `❤️ Tentativas restantes: ${restantes} de ${MAX_TENTATIVAS}`;
      }
    }

    // ---------- Processa tentativa de letra ----------
    function tentarLetra(letra) {
      if (!jogoAtivo) return;
      
      const letraUpper = letra.toUpperCase();
      
      // Verifica se já foi tentada
      if (letrasTentadas.has(letraUpper)) return;
      
      const botao = Array.from(document.querySelectorAll('.tecla')).find(
        btn => btn.textContent === letraUpper && !btn.disabled
      );
      if (!botao) return;
      
      // Marca como tentada
      letrasTentadas.add(letraUpper);
      botao.disabled = true;
      
      let acertou = false;
      
      // Verifica se a letra existe na palavra
      for (let i = 0; i < palavraArray.length; i++) {
        if (palavraArray[i] === letraUpper && !letrasDescobertas[i]) {
          letrasDescobertas[i] = true;
          acertou = true;
        }
      }
      
      if (!acertou) {
        erros++;
        desenharForca(erros);
      }
      
      // NUNCA revela quais letras acertou - apenas atualiza display (que mantém símbolos)
      atualizarDisplay();
      
      // Verifica vitória
      if (verificarVitoria()) {
        jogoAtivo = false;
        vitoria = true;
        desabilitarTodasTeclas();
        atualizarDisplay();  // agora revela a palavra
        atualizarStatusMensagens();
        return;
      }
      
      // Verifica derrota
      if (erros >= MAX_TENTATIVAS) {
        jogoAtivo = false;
        vitoria = false;
        desabilitarTodasTeclas();
        desenharForca(erros);
        atualizarDisplay();
        atualizarStatusMensagens();
        return;
      }
      
      atualizarStatusMensagens();
    }

    function desabilitarTodasTeclas() {
      document.querySelectorAll('.tecla').forEach(btn => btn.disabled = true);
    }

    // ---------- Criar teclado ----------
    function criarTeclado() {
      tecladoDiv.innerHTML = '';
      TECLAS.forEach(letra => {
        const btn = document.createElement('button');
        btn.className = 'tecla';
        btn.textContent = letra;
        btn.addEventListener('click', () => tentarLetra(letra));
        tecladoDiv.appendChild(btn);
      });
    }

    // ---------- Iniciar jogo ----------
    function iniciarJogo() {
      palavraArray = PALAVRA_SECRETA.split('');
      letrasDescobertas = new Array(palavraArray.length).fill(false);
      letrasTentadas.clear();
      
      erros = 0;
      jogoAtivo = true;
      vitoria = false;
      
      mensagemVitoriaDerrota.innerHTML = '';
      
      desenharForca(0);
      criarTeclado();
      
      atualizarDisplay();
      atualizarStatusMensagens();
      
      // Reset estilo
      simbolosMisteriosos.style.color = '#5a8a4a';
      simbolosMisteriosos.style.textShadow = '0 0 20px #2a5a2a';
    }

    // ---------- Reiniciar ----------
    reiniciarBtn.addEventListener('click', () => {
      iniciarJogo();
    });

    // ---------- Teclado físico ----------
    window.addEventListener('keydown', (e) => {
      const tecla = e.key.toUpperCase();
      if (!jogoAtivo) return;
      if (TECLAS.includes(tecla)) {
        const btn = Array.from(document.querySelectorAll('.tecla')).find(
          b => b.textContent === tecla && !b.disabled
        );
        if (btn) {
          e.preventDefault();
          tentarLetra(tecla);
        }
      }
    });
    
    iniciarJogo();
    
  })();
</script>
</body>
</html>
